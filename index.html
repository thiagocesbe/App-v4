<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Contas PRO">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Controle de Contas PRO</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#0f0f10;color:#fff;font-size:80%}
header{padding:11px;font-size:16px;font-weight:bold}
.container{padding:11px}
.card{background:#1a1a1c;border-radius:12px;padding:11px;margin-bottom:11px}
.section{margin-top:6px;padding:6px;background:#121214;border-radius:8px}
.section-header{display:flex;justify-content:space-between;align-items:center}
.add-btn{cursor:pointer}
.item{display:flex;justify-content:space-between;margin:3px 0;align-items:center;padding:6px;border-radius:6px}
.item.dragging{opacity:0.4}
.floating{position:absolute;pointer-events:none;z-index:9999;background:#1a1a1c;border-radius:8px;padding:6px;opacity:0.9;width:90%}
.total{margin-top:3px;font-weight:bold}
input,button,textarea{min-height:80px;resize:none;background:transparent;color:#fff;border:none;outline:none}
button{background:#fff;color:#000;font-weight:bold}
.small{font-size:10px;opacity:.7}
.delete-text{color:#ff4d4d;font-size:10px;margin-top:3px;cursor:pointer}
.account-header{cursor:pointer}
.arrow{margin-left:5px;font-size:11px;cursor:pointer}
input[type="color"]{width:28px;height:28px;border-radius:50%;border:none}
textarea{min-height:80px;resize:none}
</style>
</head>
<body>
<header contenteditable="true" id="title"></header>
<div class="container">

<div class="card">
<div class="section-header" onclick="toggleAccountForm()">
<strong>Nova Conta</strong>
<span id="toggleIcon">+</span>
</div>
<div id="accountForm" style="display:none">
<div style="display:flex;gap:6px">
<input id="accountName" placeholder="Nova conta" />
<input id="accountColor" type="color" value="#ffffff" />
</div>
<button onclick="addAccount()">Adicionar</button>
</div>
</div>

<div id="accounts"></div>
<div id="grandTotal" class="card"></div>

<!-- ANOTAÇÕES -->
<div class="card">
<div class="section-header" onclick="toggleNotes()">
<strong>Anotações</strong>
<span id="notesToggle">▼</span>
</div>
<div id="notesArea" style="display:none">
<textarea id="notesInput" placeholder="Escreva suas anotações..."></textarea>
</div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem('financeAppPRO')) || [];
let notes = localStorage.getItem('notes') || '';
let dragIndex = null;
let floatingEl = null;

let titleSaved = localStorage.getItem('appTitle') || 'Meu Controle';
const titleEl=document.getElementById('title');
titleEl.innerText=titleSaved;
titleEl.onblur=()=>localStorage.setItem('appTitle',titleEl.innerText);

const notesInput=document.getElementById('notesInput');
notesInput.value=notes;
notesInput.oninput=()=>localStorage.setItem('notes',notesInput.value);

function toggleNotes(){
let area=document.getElementById('notesArea');
let icon=document.getElementById('notesToggle');
if(area.style.display==='none'){area.style.display='block';icon.innerText='▲'}
else{area.style.display='none';icon.innerText='▼'}
}

function save(){localStorage.setItem('financeAppPRO',JSON.stringify(data));}
function brl(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function parseValue(v){return parseFloat(v.replace(',','.'))||0;}

function toggleAccountForm(){
let f=document.getElementById('accountForm');
let icon=document.getElementById('toggleIcon');
if(f.style.display==='none'){f.style.display='block';icon.innerText='−'}
else{f.style.display='none';icon.innerText='+'}
}

function defaultSections(){return[
{name:'Contas Recorrentes',items:[]},
{name:'Contas Parceladas',items:[]},
{name:'Gastos Diversos',items:[]}
];}

function addAccount(){
let name = document.getElementById('accountName').value.trim();
let color = document.getElementById('accountColor').value || '#ffffff';
if(!name){ alert('Digite um nome'); return; }

data.push({name,color,sections:defaultSections(),editing:null,showForm:{},editingAccount:false});

document.getElementById('accountName').value='';
save();render();
}

function toggleAccountEdit(ai){data[ai].editingAccount=!data[ai].editingAccount;render();}
function deleteAccount(ai){data.splice(ai,1);save();render();}

function toggleForm(ai,si){data[ai].showForm[si]=!data[ai].showForm[si];data[ai].editing=null;render();}
function startEdit(ai,si,ii){data[ai].editing={si,ii};render();}

function nextParcela(ai,si,ii){
let item=data[ai].sections[si].items[ii];
if(item.parcelas && item.atual < item.parcelas){item.atual++;}
save();render();
}

function saveItem(ai,si,ii=null){
let name=document.getElementById(`name-${ai}-${si}`).value;
let value=parseValue(document.getElementById(`value-${ai}-${si}`).value);
let due=null;let parcelas=null;

if(data[ai].sections[si].name==='Contas Recorrentes'){
due=document.getElementById(`due-${ai}-${si}`).value;
}
if(data[ai].sections[si].name==='Contas Parceladas'){
parcelas=parseInt(document.getElementById(`parc-${ai}-${si}`)?.value) || (ii!==null ? data[ai].sections[si].items[ii].parcelas : 1);
}

if(!name||!value)return;

if(ii!==null){
let it=data[ai].sections[si].items[ii];
it.name=name;it.value=value;it.due=due;
if(parcelas) it.parcelas=parcelas;
}else{
data[ai].sections[si].items.push({name,value,due,parcelas,atual:1});
}

data[ai].showForm[si]=false;
data[ai].editing=null;
save();render();}

function deleteItem(ai,si,ii){data[ai].sections[si].items.splice(ii,1);save();render();}

// DRAG COM ITEM FLUTUANDO
function touchStart(ai,si,ii,e){
  dragIndex = { ai, si, ii };

  const itemEl = e.currentTarget.cloneNode(true);
  const parent = e.currentTarget.parentNode;

  itemEl.classList.add('floating');
  parent.appendChild(itemEl);

  floatingEl = itemEl;
};

  const itemEl = e.currentTarget.cloneNode(true);
  itemEl.classList.add('floating');
  document.body.appendChild(itemEl);
  floatingEl = itemEl;
}

function touchMove(e, ai, si){
  if(!dragIndex) return;

  const touch = e.touches[0];
  const section = e.currentTarget.parentNode;

  if(floatingEl){
    const rect = section.getBoundingClientRect();
    floatingEl.style.top = (touch.clientY - rect.top) + 'px';
    floatingEl.style.left = '5%';
  }

  const elements = document.elementsFromPoint(touch.clientX, touch.clientY);
  const target = elements.find(el => el.classList?.contains('item'));
  if(!target) return;

  const children = Array.from(section.querySelectorAll('.item'));
  const newIndex = children.indexOf(target);
  const arr = data[ai].sections[si].items;

  if(newIndex >= 0 && newIndex !== dragIndex.ii){
    const moved = arr.splice(dragIndex.ii, 1)[0];
    arr.splice(newIndex, 0, moved);
    dragIndex.ii = newIndex;
    render();
  }
}

  const elements = document.elementsFromPoint(touch.clientX, touch.clientY);
  const target = elements.find(el => el.classList?.contains('item'));
  if(!target) return;

  const children = Array.from(target.parentNode.querySelectorAll('.item'));
  const newIndex = children.indexOf(target);
  const arr = data[ai].sections[si].items;

  if(newIndex >= 0 && newIndex !== dragIndex.ii){
    const moved = arr.splice(dragIndex.ii, 1)[0];
    arr.splice(newIndex, 0, moved);
    dragIndex.ii = newIndex;
    render();
  }
}

function touchEnd(){
  if(floatingEl){
    floatingEl.remove();
    floatingEl = null;
  }
  dragIndex = null;
  save();
}
  dragIndex = null;
  save();
}

function render(){
let el=document.getElementById('accounts');el.innerHTML='';
let grand=0;

data.forEach((acc,ai)=>{
let accTotal=0;
let card=document.createElement('div');card.className='card';

let header=`<div class='account-header' style="color:${acc.color}" onclick="toggleAccountEdit(${ai})">${acc.name}</div>`;
if(acc.editingAccount){header+=`<div class='delete-text' onclick='deleteAccount(${ai})'>Excluir conta</div>`;}
card.innerHTML=header;

acc.sections.forEach((sec,si)=>{
let secTotal=0;
let secDiv=document.createElement('div');secDiv.className='section';
secDiv.innerHTML=`<div class='section-header'><strong>${sec.name}</strong><span class='add-btn' onclick='toggleForm(${ai},${si})'>+</span></div>`;

sec.items.forEach((it,ii)=>{
secTotal+=it.value;
let parcelaTxt='';
if(it.parcelas){let a=String(it.atual).padStart(2,'0');let t=String(it.parcelas).padStart(2,'0');parcelaTxt=` (${a}/${t})`;}
let dueTxt=(it.due && sec.name==='Contas Recorrentes')?`<div class='small' style="color:#aaa">dia ${it.due}</div>`:'';

if(acc.editing && acc.editing.si===si && acc.editing.ii===ii){
secDiv.innerHTML+=`<div>
<input id='name-${ai}-${si}' value='${it.name}'>
<input id='value-${ai}-${si}' inputmode='decimal' value='${it.value}'>
${sec.name==='Contas Recorrentes'?`<input id='due-${ai}-${si}' inputmode='numeric' value='${it.due||''}'>`:''}
${sec.name==='Contas Parceladas'?`<input id='parc-${ai}-${si}' inputmode='numeric' value='${it.parcelas||''}'>`:''}
<button onclick='saveItem(${ai},${si},${ii})'>Salvar</button>
<div class='delete-text' onclick='deleteItem(${ai},${si},${ii})'>Excluir</div>
</div>`;
}else{
secDiv.innerHTML+=`<div class='item'
 ontouchstart='touchStart(${ai},${si},${ii}, event)'
 ontouchmove='touchMove(event, ${ai}, ${si})'
 ontouchend='touchEnd()'>
<span style="color:${acc.color}" onclick='startEdit(${ai},${si},${ii})'>${it.name}${parcelaTxt}${dueTxt}</span>
<span>
<span style="color:${acc.color}">${brl(it.value)}</span>
${it.parcelas?`<span class='arrow' onclick='event.stopPropagation(); nextParcela(${ai},${si},${ii})'>➡️</span>`:''}
</span>
</div>`;
}
});

if(acc.showForm[si]){
secDiv.innerHTML+=`<div>
<input id='name-${ai}-${si}' placeholder='Descrição'>
<input id='value-${ai}-${si}' inputmode='decimal' placeholder='R$'>
${sec.name==='Contas Recorrentes'?`<input id='due-${ai}-${si}' inputmode='numeric' placeholder='Vencimento'>`:''}
${sec.name==='Contas Parceladas'?`<input id='parc-${ai}-${si}' inputmode='numeric' placeholder='Parcelas'>`:''}
<button onclick='saveItem(${ai},${si})'>Salvar</button>
</div>`;
}

secDiv.innerHTML+=`<div class='total'>Total: ${brl(secTotal)}</div>`;
card.appendChild(secDiv);
accTotal+=secTotal;
});

card.innerHTML+=`<div class='total'>Total Conta: ${brl(accTotal)}</div>`;
el.appendChild(card);
grand+=accTotal;
});

document.getElementById('grandTotal').innerHTML=`Total Geral: ${brl(grand)}`;
}

render();
</script>
</body>
</html>
