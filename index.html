<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Contas PRO">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<title>Controle de Contas PRO</title>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#0f0f10;color:#fff}
header{padding:16px;font-size:20px;font-weight:bold}
.container{padding:16px}
.card{background:#1a1a1c;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.section{margin-top:10px;padding:10px;background:#121214;border-radius:12px}
.section-header{display:flex;justify-content:space-between;align-items:center}
.add-btn{font-size:20px;font-weight:bold;cursor:pointer;opacity:.8}
.item{display:flex;justify-content:space-between;margin:6px 0;align-items:center;cursor:pointer}
.item span:last-child{text-align:right;flex-shrink:0}
.total{margin-top:6px;font-weight:bold}
input,button{width:100%;margin:6px 0;padding:10px;border-radius:10px;border:none;font-size:16px}
button{background:#fff;color:#000;font-weight:bold}
.small{font-size:12px;opacity:.7}
.topbar{display:flex;gap:10px;align-items:center}
.form{background:#1f1f22;padding:10px;border-radius:10px;margin-top:8px}
.small-btn{width:auto;padding:6px 10px;font-size:13px}
.delete-text{color:#ff4d4d;font-size:12px;margin-top:6px;cursor:pointer}
.account-header{cursor:pointer}
.arrow{margin-left:8px;font-size:14px;opacity:.7}

input[type="color"]{width:36px;height:36px;border-radius:50%;padding:0;border:none;overflow:hidden}
input, select, textarea {font-size:16px}
</style>
</head>
<body>
<header contenteditable="true" id="title">Meu Controle</header>
<div class="container">

<div class="card">
<div class="section-header" onclick="toggleAccountForm()">
<strong>Nova Conta</strong>
<span id="toggleIcon">−</span>
</div>

<div id="accountForm">
<div class="topbar">
<input id="accountName" placeholder="Nova conta" />
<input id="accountColor" type="color" />
</div>
<button class="small-btn" onclick="addAccount()">Adicionar</button>
</div>
</div>

<div id="accounts"></div>
<div id="grandTotal" class="card"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('financeAppPRO')) || [];
let showAccountForm = true;

function save(){localStorage.setItem('financeAppPRO',JSON.stringify(data));}
function brl(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function parseValue(v){return parseFloat(v.replace(',','.')) || 0;}

function toggleAccountForm(){
showAccountForm=!showAccountForm;
document.getElementById('accountForm').style.display=showAccountForm?'block':'none';
document.getElementById('toggleIcon').innerText=showAccountForm?'−':'+';
}

function defaultSections(){return[
{name:'Contas Recorrentes',items:[]},
{name:'Contas Parceladas',items:[]},
{name:'Gastos Diversos',items:[]}
];}

function addAccount(){
const name=document.getElementById('accountName').value;
const color=document.getElementById('accountColor').value;
if(!name)return;
data.push({name,color,sections:defaultSections(),showForm:{},editing:null,editingAccount:false});
document.getElementById('accountName').value='';
save();render();}

function toggleForm(ai,si){
data[ai].showForm[si]=!data[ai].showForm[si];
data[ai].editing=null;
render();}

function startEdit(ai,si,ii){data[ai].editing={si,ii};render();}

function toggleAccountEdit(ai){data[ai].editingAccount=!data[ai].editingAccount;render();}

function deleteAccount(ai){data.splice(ai,1);save();render();}

function nextParcela(ai,si,ii){
let item=data[ai].sections[si].items[ii];
if(item.parcelas && item.atual<item.parcelas){item.atual++;}
save();render();}

function saveItem(ai,si,ii=null){
const name=document.getElementById(`name-${ai}-${si}`).value;
const value=parseValue(document.getElementById(`value-${ai}-${si}`).value);
let due = null;
let parcelas=null;

if(data[ai].sections[si].name==='Contas Recorrentes'){
due=document.getElementById(`due-${ai}-${si}`).value;
}

if(data[ai].sections[si].name==='Contas Parceladas'){
parcelas=parseInt(document.getElementById(`parc-${ai}-${si}`).value);
}

if(!name || !value) return;

if(ii!==null){
let it=data[ai].sections[si].items[ii];
it.name=name;it.value=value;it.due=due;it.parcelas=parcelas;
}else{
data[ai].sections[si].items.push({name,value,due,parcelas,atual:1});
}

data[ai].showForm[si]=false;
data[ai].editing=null;
save();render();}

function deleteItem(ai,si,ii){data[ai].sections[si].items.splice(ii,1);save();render();}

function render(){
const el=document.getElementById('accounts');el.innerHTML='';
let grand=0;

data.forEach((acc,ai)=>{
if(!acc.showForm) acc.showForm={};
let accTotal=0;
let card=document.createElement('div');card.className='card';

let header = `<div class='account-header' style="color:${acc.color};font-weight:bold" onclick="toggleAccountEdit(${ai})">${acc.name}</div>`;
if(acc.editingAccount){header += `<div class='delete-text' onclick='deleteAccount(${ai})'>Excluir conta</div>`;}
card.innerHTML = header;

acc.sections.forEach((sec,si)=>{
let secTotal=0;
let secDiv=document.createElement('div');secDiv.className='section';
secDiv.innerHTML=`
<div class='section-header'>
<strong>${sec.name}</strong>
<span class='add-btn' onclick='toggleForm(${ai},${si})'>+</span>
</div>`;

sec.items.forEach((it,ii)=>{
secTotal+=it.value;

let parcelaTxt = '';
if(it.parcelas){
let atual = String(it.atual).padStart(2,'0');
let total = String(it.parcelas).padStart(2,'0');
parcelaTxt = ` (${atual}/${total})`;
}

let dueTxt = '';
if(it.due && sec.name==='Contas Recorrentes'){
dueTxt = `<div class='small'>dia ${it.due}</div>`;
}

if(acc.editing && acc.editing.si===si && acc.editing.ii===ii){
secDiv.innerHTML+=`<div class='form'>
<input id='name-${ai}-${si}' value='${it.name}' placeholder='Descrição'>
<input id='value-${ai}-${si}' value='${it.value}' placeholder='R$'>
${sec.name==='Contas Recorrentes'?`<input id='due-${ai}-${si}' value='${it.due||''}' placeholder='Vencimento'>`:''}
<button onclick='saveItem(${ai},${si},${ii})'>Salvar</button>
<div class='delete-text' onclick='deleteItem(${ai},${si},${ii})'>Excluir</div>
</div>`;
}else{
secDiv.innerHTML+=`<div class='item' onclick='startEdit(${ai},${si},${ii})'>
<span>${it.name}${parcelaTxt}${dueTxt}</span>
<span>${brl(it.value)} ${it.parcelas?`<span class='arrow' onclick='event.stopPropagation(); nextParcela(${ai},${si},${ii})'>➡️</span>`:''}</span>
</div>`;
}
});

if(acc.showForm[si]){
secDiv.innerHTML+=`<div class='form'>
<input id='name-${ai}-${si}' placeholder='Descrição'>
<input id='value-${ai}-${si}' placeholder='R$'>
${sec.name==='Contas Recorrentes'?`<input id='due-${ai}-${si}' placeholder='Vencimento'>`:''}
${sec.name==='Contas Parceladas'?`<input id='parc-${ai}-${si}' placeholder='Parcelas'>`:''}
<button onclick='saveItem(${ai},${si})'>Salvar</button>
</div>`;
}

secDiv.innerHTML+=`<div class='total'>Total: ${brl(secTotal)}</div>`;
card.appendChild(secDiv);
accTotal+=secTotal;
});

card.innerHTML+=`<div class='total'>Total Conta: ${brl(accTotal)}</div>`;
el.appendChild(card);
grand+=accTotal;
});

document.getElementById('grandTotal').innerHTML=`Total Geral: ${brl(grand)}`;
}

render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
